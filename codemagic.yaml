# ─────────────────────────────────────────────────────────────────────────────
# RydeCircle Rider App — codemagic.yaml  (TESTING / DEVELOPMENT)
#
# Environment variable groups to create in Codemagic UI → App settings:
#
#   rydecircle_shared        API_BASE_URL
#   rydecircle_flutterwave   FLUTTERWAVE_PUBLIC_KEY  (FLWPUBK_TEST-xxx)
# ─────────────────────────────────────────────────────────────────────────────

workflows:

  rider-android-debug:
    name: Rider App — Debug APK (Testing)
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      java: 17
      groups:
        - rydecircle_shared
        - rydecircle_flutterwave

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '*'
          include: true
      cancel_previous_builds: true

    scripts:

      # ── 1. Regenerate Android folder if Gradle setup is outdated ───────────
      # This fixes: "Your app is using an unsupported Gradle project"
      # Safe to run every time — only touches android/, never lib/ or pubspec
      - name: Regenerate Android project (fix unsupported Gradle)
        script: |
          flutter create --platforms=android .
          echo "Android folder regenerated"

      # ── 2. Set NDK version required by flutterwave_standard ───────────────
      - name: Set NDK version
        script: |
          # Try build.gradle.kts first (newer projects), then build.gradle
          GRADLE_KTS="android/app/build.gradle.kts"
          GRADLE="android/app/build.gradle"

          if [ -f "$GRADLE_KTS" ]; then
            if grep -q "ndkVersion" "$GRADLE_KTS"; then
              sed -i 's/ndkVersion = .*/ndkVersion = "27.0.12077973"/' "$GRADLE_KTS"
            else
              sed -i '/android {/a\    ndkVersion = "27.0.12077973"' "$GRADLE_KTS"
            fi
            echo "NDK set in $GRADLE_KTS:"
            grep "ndkVersion" "$GRADLE_KTS"
          fi

          if [ -f "$GRADLE" ]; then
            if grep -q "ndkVersion" "$GRADLE"; then
              sed -i 's/ndkVersion .*/ndkVersion "27.0.12077973"/' "$GRADLE"
            else
              sed -i '/android {/a\    ndkVersion "27.0.12077973"' "$GRADLE"
            fi
            echo "NDK set in $GRADLE:"
            grep "ndkVersion" "$GRADLE"
          fi

      # ── 3. Install dependencies ────────────────────────────────────────────
      - name: flutter pub get
        script: flutter pub get

      # ── 4. Run tests ───────────────────────────────────────────────────────
      - name: Run tests
        script: flutter test || true

      # ── 5. Build debug APK ─────────────────────────────────────────────────
      - name: Build debug APK
        script: |
          flutter build apk --debug \
            --dart-define=API_BASE_URL="$API_BASE_URL" \
            --dart-define=FLUTTERWAVE_PUBLIC_KEY="$FLUTTERWAVE_PUBLIC_KEY" \
            --dart-define=FLW_TEST_MODE=true

    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk

    publishing:
      email:
        recipients:
          - dev@rydecircle.com
        notify:
          success: true
          failure: true


