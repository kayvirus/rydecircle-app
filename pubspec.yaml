name: rydecircle_rider
description: RydeCircle Passenger App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Networking
  http: ^1.2.1

  # Local storage
  shared_preferences: ^2.3.1

  # Fonts
  google_fonts: ^6.2.1

  # UI / animations
  flutter_animate: ^4.5.0
  flutter_staggered_animations: ^1.1.1
  gap: ^3.0.1
  shimmer: ^3.0.0
  timeline_tile: ^2.0.0
  percent_indicator: ^4.2.3

  # Image picking — camera + gallery (Android only, no iOS native setup needed)
  image_picker: ^1.1.2

  # Display remote images with in-memory caching
  cached_network_image: ^3.3.1

  # Paystack inline checkout
  flutter_paystack_plus: ^3.0.0

  # Date formatting
  intl: ^0.19.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
