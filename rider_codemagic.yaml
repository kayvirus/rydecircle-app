# ─────────────────────────────────────────────────────────────────────────────
# RydeCircle Rider App — codemagic.yaml  (TESTING / DEVELOPMENT)
#
# Produces a debug APK you can install directly on any Android device.
# No keystore, no signing setup required.
#
# Environment variable groups to create in Codemagic UI → App settings:
#
#   rydecircle_shared      API_BASE_URL
#   rydecircle_paystack    PAYSTACK_PUBLIC_KEY   ← use your TEST key (pk_test_xxx)
#
# When you're ready for production, switch to the release workflow below.
# ─────────────────────────────────────────────────────────────────────────────

workflows:

  # ── TESTING — debug APK, no signing needed ──────────────────────────────────
  rider-android-debug:
    name: Rider App — Debug APK (Testing)
    max_build_duration: 30
    instance_type: mac_mini_m2      # cheapest instance, no macOS needed for Android

    environment:
      flutter: stable
      java: 17
      groups:
        - rydecircle_shared
        - rydecircle_paystack

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '*'           # trigger on every branch while testing
          include: true
      cancel_previous_builds: true

    scripts:
      - name: flutter pub get
        script: flutter pub get

      - name: Run tests
        script: flutter test || true

      - name: Build debug APK
        script: |
          flutter build apk --debug \
            --dart-define=API_BASE_URL="$API_BASE_URL" \
            --dart-define=PAYSTACK_PUBLIC_KEY="$PAYSTACK_PUBLIC_KEY"

    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk

    publishing:
      email:
        recipients:
          - dev@rydecircle.com
        notify:
          success: true
          failure: true


